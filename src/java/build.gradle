plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()

    maxHeapSize = '2048m'
    maxParallelForks = 1

    def libPath = System.getProperty('java.library.path')
    if (libPath != null) {
        jvmArgs "-Djava.library.path=$libPath"
    }
}
